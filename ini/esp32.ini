#
# Marlin Firmware
# PlatformIO Configuration File
#

#################################
#                               #
#      ESP32 Architecture       #
#                               #
#################################

#
# Espressif ESP32
#
[env:esp32]
platform          = espressif32@3.3.2
platform_packages = espressif/toolchain-xtensa-esp32s3
board             = esp32dev
build_flags       = ${common.build_flags} -DCORE_DEBUG_LEVEL=0 -std=gnu++17
build_unflags     = -std=gnu11 -std=gnu++11
build_src_filter  = ${common.default_src_filter} +<src/HAL/ESP32>
lib_ignore        = NativeEthernet
upload_speed = 921600
monitor_speed = 115200
monitor_filters   = time, send_on_enter, log2file, esp32_exception_decoder
#upload_port      = marlinesp.local
#board_build.flash_mode = qio

[env:mks_tinybee]
extends                = env:esp32
platform               = espressif32@3.3.2
board_build.partitions = default_8MB.csv
; upload_port = COM9
